name: Single Unit Test

on:
  workflow_call:
    inputs:
      gradleVersion:
        type: string
        required: true
        description: 'Gradle version – see: https://github.com/gradle/gradle/releases'
      os:
        type: string
        required: true
        description: 'Operation system'
      cacheReadOnly:
        type: boolean
        default: false
        required: false
        description: 'Controls writing the Gradle cache'
      testName:
        type: string
        required: false
        description: 'Optional test name to run'

jobs:
  unitTests:
    name: Gradle ${{ inputs.gradleVersion }} @ ${{ inputs.os }}
    runs-on: ${{ inputs.os }}
    permissions:
      checks: write
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: false

      - name: Fetch Sources
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ inputs.cacheReadOnly }}

      - name: Cache IntelliJ Platform test cache
        uses: actions/cache@v5
        with:
          path: .gradle/testGradleHome/.intellijPlatform
          key: test-gradle-home-v2-intellij-platform-${{ runner.os }}-${{ hashFiles('gradle.properties') }}
          restore-keys: |
            test-gradle-home-v2-intellij-platform-${{ runner.os }}-

      - name: Cache Gradle TestKit
        uses: actions/cache@v5
        with:
          path: .gradle/testGradleHome/.testKit
          key: test-gradle-home-v1-testkit-${{ runner.os }}-${{ inputs.gradleVersion }}-${{ hashFiles('gradle.properties', 'build.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: |
            test-gradle-home-v1-testkit-${{ runner.os }}-

      - name: Run Tests
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
          TEST_NAME: ${{ inputs.testName }}
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            TEST_GRADLE_USER_HOME="$(pwd -W)\\.gradle\\testGradleHome"
          else
            TEST_GRADLE_USER_HOME="$PWD/.gradle/testGradleHome"
          fi
          [ -z "$TEST_NAME" ] && TESTS="" || TESTS="--tests $TEST_NAME"
          
          ./gradlew check test \
            -PtestGradleVersion="${{ inputs.gradleVersion }}" \
            -PtestGradleUserHome="$TEST_GRADLE_USER_HOME" \
            $TESTS \
            --console=plain \
            --no-build-cache
