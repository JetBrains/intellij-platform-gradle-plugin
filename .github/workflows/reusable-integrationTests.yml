name: Reusable Integration Tests

on:
  workflow_call:
    inputs:
      platformVersion:
        required: false
        default: 2022.1.4
        type: string
      testName:
        required: false
        default: ""
        type: string

jobs:
  integrationTests:
    name: Gradle ${{ matrix.gradleVersion }} @ ${{ matrix.os }} [${{ matrix.testShard }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        gradleVersion:
          - "9.0.0"
          - "9.4.0"
          - "nightly"
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        testShard: ${{ fromJSON(inputs.testName != '' && '["manual"]' || '["group-a","group-b","group-c"]') }}

    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: false

      - name: Fetch Sources
        uses: actions/checkout@v6

      - name: Validate Integration Test Shards
        if: ${{ inputs.testName == '' && matrix.testShard == 'group-a' && matrix.os == 'ubuntu-latest' && matrix.gradleVersion == '9.4.0' }}
        shell: bash
        run: python3 .github/scripts/validate_integration_test_shards.py

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true

      - name: Restore TestKit Gradle Home
        uses: actions/cache@v5
        with:
          path: .test-gradle-home
          key: testkit-home-v1-${{ runner.os }}-${{ matrix.gradleVersion }}-${{ inputs.platformVersion }}-${{ hashFiles('gradle.properties') }}
          restore-keys: |
            testkit-home-v1-${{ runner.os }}-${{ matrix.gradleVersion }}-${{ inputs.platformVersion }}-
            testkit-home-v1-${{ runner.os }}-${{ matrix.gradleVersion }}-
            testkit-home-v1-${{ runner.os }}-

      - name: Run Tests
        env:
          DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
          TEST_NAME: ${{ inputs.testName }}
          TEST_SHARD: ${{ matrix.testShard }}
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            TEST_GRADLE_USER_HOME="$(pwd -W)\\.test-gradle-home"
          else
            TEST_GRADLE_USER_HOME="$PWD/.test-gradle-home"
          fi
          TESTS=()

          if [ -n "$TEST_NAME" ]; then
            TESTS+=(--tests "$TEST_NAME")
          else
            case "$TEST_SHARD" in
              group-a)
                TESTS+=(
                  --tests '*AwaresIntegrationTest'
                  --tests '*ClassPathShorteningTest'
                  --tests '*ClasspathInstrumentationTest'
                  --tests '*DependenciesValidationIntegrationTest'
                  --tests '*DependencyLockingAndVerificationIntegrationTest'
                  --tests '*InstrumentationTaskIntegrationTest'
                  --tests '*SandboxIntegrationTest'
                  --tests '*SettingsNotSoStrictResolutionManagementIntegrationTest'
                  --tests '*SubmoduleSetupIntegrationTest'
                )
                ;;
              group-b)
                TESTS+=(
                  --tests '*DependencyVerificationIgnoreIntellijIntegrationTest'
                  --tests '*InstrumentationTaskDisabledIntegrationTest'
                  --tests '*MultiModuleIntegrationTest'
                  --tests '*MultiPluginIntegrationTest'
                  --tests '*PluginXmlPatchingIntegrationTest'
                  --tests '*SearchableOptionsIntegrationTest'
                  --tests '*SettingsStrictResolutionManagementIntegrationTest'
                  --tests '*SplitModeIntegrationTest'
                  --tests '*VerifyPluginConfigurationIntegrationTest'
                )
                ;;
              group-c)
                TESTS+=(
                  --tests '*ApplyRecommendedRepositoriesIntegrationTest'
                  --tests '*ComposeHotReloadIntegrationTest'
                  --tests '*DependencyLockingIntegrationTest'
                  --tests '*ExcludeHelpersIntegrationTest'
                  --tests '*GradlePropertiesIntegrationTest'
                  --tests '*IdesConfigurationIntegrationTest'
                  --tests '*JarManifestFileIntegrationTest'
                  --tests '*TestClasspathProjectResourcesIntegrationTest'
                )
                ;;
              *)
                echo "Unknown integration test shard: $TEST_SHARD"
                exit 1
                ;;
            esac
          fi

          ./gradlew integrationTest \
            -PtestGradleVersion="${{ matrix.gradleVersion }}" \
            -PtestGradleUserHome="$TEST_GRADLE_USER_HOME" \
            "${TESTS[@]}" \
            --console=plain
